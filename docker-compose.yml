version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: testtask-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: testtask
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/TestTask.Api/Dockerfile
    container_name: testtask-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=testtask;Username=postgres;Password=postgres"
    ports:
      - "8080:8080"

volumes:
  pgdata:
